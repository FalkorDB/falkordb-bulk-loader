name: CI
permissions:
  contents: read

on:
  push:
    paths-ignore:
      - '**/*.md'
      - 'examples*/**'
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: '5 4 * * *'

env:
  basepython: '3.10'

jobs:
  lint:
    name: Code linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ env.basepython }}
      - name: Install dependencies
        run: uv sync --all-groups --frozen --python ${{ env.basepython }}
      - name: lint
        run: |
          uv run flake8 --show-source falkordb_bulk_loader
          uv run black --target-version py310 --check --diff falkordb_bulk_loader
          uv run isort --check-only --diff falkordb_bulk_loader
          uv run vulture falkordb_bulk_loader/ --min-confidence 80
          uv run flynt --fail-on-change --dry-run falkordb_bulk_loader

  tests:
    name: Test with Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    services:
      stack:
        image: falkordb/falkordb:edge
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3
        ports:
          - 6379:6379
    strategy:
      matrix:
        python: ['3.10', '3.11']
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: Install dependencies
        run: uv sync --all-groups --frozen --python ${{ matrix.python }}
      - name: Run tests
        run: |
          find . -type f -name "*.pyc" -delete
          uv run pytest --cov-report=xml --cov falkordb_bulk_loader
      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        if: matrix.python == '3.10'
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
